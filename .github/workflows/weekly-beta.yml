on:
  schedule:
    - cron: '0 0 * * 0' # every Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  determine_version:
    runs-on: ubuntu-latest
    outputs:
      has_recent_changes: ${{ steps.check_commits.outputs.has_recent_changes }}
      version: ${{ steps.version.outputs.version }}
      commit:  ${{ steps.version.outputs.commit }}

    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }

    - name: Check for recent commits
      id: check_commits
      run: |
        if [ "${{ github.event_name }}" != "schedule" ]; then
          echo "has_recent_changes=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ -z "$(git log --since='1 week ago' -1)" ]; then
          echo "::warning::No commits in 7 days - skipping build"
          echo "has_recent_changes=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "has_recent_changes=true" >> "$GITHUB_OUTPUT"

    - name: Calculate version
      id: version
      if: ${{ steps.check_commits.outputs.has_recent_changes == 'true' }}
      run: |
        short_sha=$(git rev-parse --short HEAD)

        # latest tag or 0.0.1 if none
        latest_release=$(git tag -l --sort=-creatordate | head -n 1)
        base_version=${latest_release:-0.0.1}
        base_version=${base_version#v}

        version="${base_version}-beta.${{ github.run_number }}"
        echo "Calculated version: $version ($short_sha)"

        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "commit=$short_sha" >> "$GITHUB_OUTPUT"

  build:
    needs: determine_version
    if: ${{ needs.determine_version.outputs.has_recent_changes == 'true' }}
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.determine_version.outputs.version }}
      commit: ${{ needs.determine_version.outputs.commit }}
    secrets: inherit
